# Nginx 配置示例 - Telegram Bot Webhook
# 将此配置放入 /etc/nginx/sites-available/ 并创建软链接到 sites-enabled/

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名
    
    # 重定向 HTTP 到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com;  # 替换为你的域名

    # SSL 证书配置（使用 Let's Encrypt 示例路径）
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    
    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Webhook 路径转发到 Java 应用
    location /webhook {
        proxy_pass http://127.0.0.1:8443/webhook;
        proxy_http_version 1.1;
        
        # 设置请求头
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # 可选：健康检查接口
    location /health {
        proxy_pass http://127.0.0.1:8443/health;
        access_log off;
    }
}
