# Redis 配置文件
# 用于 accounting-bot 账目补录机制

# 绑定地址和端口
bind 0.0.0.0
port 63179

# 数据目录和日志
dir "/data"
logfile "/logs/redis.log"

# 密码认证
requirepass "Rx5mK8vN2pL6wQjT"

# ========== 持久化配置 ==========

# RDB 持久化（快照）- 同时启用双重保障
save 900 1      # 900秒内至少有1个key变化则保存
save 300 10     # 300秒内至少有10个key变化则保存
save 60 100     # 60秒内至少有100个key变化则保存

# RDB 文件名
dbfilename dump.rdb

# AOF 持久化（日志）- 主要恢复手段
appendonly yes
appendfilename "appendonly.aof"

# AOF 同步策略：每秒同步（性能和安全的平衡）
appendfsync everysec

# AOF 重写配置
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 加载AOF时如果文件损坏，尽量恢复数据
aof-load-truncated yes

# ========== 内存和性能配置 ==========

# 最大内存限制（根据服务器调整）
# maxmemory 256mb

# 内存淘汰策略
# maxmemory-policy allkeys-lru

# 客户端连接数
maxclients 100

# TCP 连接保活
tcp-keepalive 300

# 超时时间（0表示不超时）
timeout 0

# ========== 日志配置 ==========

# 日志级别：notice 适合生产环境
loglevel notice

# 是否记录到系统日志
syslog-enabled no

# ========== 安全配置 ==========

# 禁止危险命令（可选）
# rename-command FLUSHALL ""
# rename-command FLUSHDB ""
# rename-command CONFIG ""
